apiVersion: v2.edp.epam.com/v1
kind: Codebase
metadata:
  name: ${codebaseName}
  labels:
    type: data-component
    version: ${version}
spec:
  jenkinsSlave: ${jenkinsAgent}
  defaultBranch: ${defaultBranch}
  buildTool: ${buildTool}
  gitUrlPath: /${codebaseName}
  ciTool: jenkins
  versioning:
    startFrom: ${version}
    type: edp
  jobProvisioning: ${jobProvisioner}
  lang: Java
  framework: Spring
  type: application
  deploymentScript: helm-chart
  gitServer: gerrit
  strategy: create
  emptyProject: true
